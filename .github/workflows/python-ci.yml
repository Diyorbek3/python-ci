# .github/workflows/python-ci.yml
name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} da test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false   # Bitta versiya xato bersa ham qolganlari to'xtamaydi

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} o'rnatish
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: pip paketlarini o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest bilan testlarni ishlatish
        run: PYTHONPATH=. pytest tests/ -v --cov=. --cov-report=xml

      - name: Coverage hisobotini saqlash
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
  # ═══ NOTIFICATION JOB ═══
  notify-on-failure:
    name: Xato haqida xabar yuborish
    runs-on: ubuntu-latest
    needs: test
    if: failure()   # FAQAT test job'laridan birortasi muvaffaqiyatsiz (failed) bo'lganda ishlaydi

    steps:
      - name: Email yuborish
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: '[XATO] CI Pipeline muvaffaqiyatsiz: ${{ github.repository }}'
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Actions
          body: |
            CI Pipeline muvaffaqiyatsiz tugadi!

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Kim push qildi: ${{ github.actor }}
            Xabar: ${{ github.event.head_commit.message }}

            Batafsil ko'rish va tekshirish: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
