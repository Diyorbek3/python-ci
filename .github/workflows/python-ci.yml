# .github/workflows/python-ci.yml
name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} da test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false   # Bitta versiya xato bersa ham qolganlari to'xtamaydi

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} o'rnatish
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: pip paketlarini o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest bilan testlarni ishlatish
        run: PYTHONPATH=. pytest tests/ -v --cov=. --cov-report=xml

      - name: Coverage hisobotini saqlash
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
